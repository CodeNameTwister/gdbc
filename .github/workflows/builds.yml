# branches:
#   - "main"

name: 🛠️ Builds
on:
  workflow_dispatch:
  push:
    tags:
      - "*"
jobs:
  build:
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - identifier: linux-x86-64-debug
            name: 🐧 Linux x86_64 Debug
            runner: ubuntu-24.04
            target: template_debug
            dev_build: yes
            platform: linux
            arch: x86_64
          - identifier: linux-x86-64-release
            name: 🐧Linux x86_64 Release
            runner: ubuntu-24.04
            target: template_release
            dev_build: no
            platform: linux
            arch: x86_64
          - identifier: linux-arm64-debug
            name: 🐧 Linux arm64 Debug
            runner: ubuntu-24.04-arm
            target: template_debug
            dev_build: yes
            platform: linux
            arch: arm64
          - identifier: linux-arm64-release
            name: 🐧Linux arm64 Release
            runner: ubuntu-24.04-arm
            target: template_release
            dev_build: no
            platform: linux
            arch: arm64
          - identifier: macos-debug
            name: 🍎 macOS (universal) Debug
            runner: macos-latest
            target: template_debug
            dev_build: yes
            platform: macos
            arch: universal
          - identifier: macos-release
            name: 🍎 macOS (universal) Release
            runner: macos-latest
            target: template_release
            dev_build: no
            platform: macos
            arch: universal
          - identifier: windows-debug
            name: 🏁 windows debug
            runner: windows-latest
            target: template_debug
            dev_build: yes
            platform: windows
            arch: x86_64
          - identifier: windows-release
            name: 🏁 Windows Release
            runner: windows-latest
            target: template_release
            dev_build: no
            platform: windows
            arch: x86_64
          - identifier: android-arm64-debug
            name: 🤖 Android arm64 Debug
            runner: ubuntu-24.04
            target: template_debug
            dev_build: yes
            platform: android
            arch: arm64
          - identifier: android-arm64-release
            name: 🤖 Android arm64 Release
            runner: ubuntu-24.04
            target: template_release
            dev_build: no
            platform: android
            arch: arm64
          - identifier: android-x86_64-debug
            name: 🤖 Android x86_64 Debug
            runner: ubuntu-24.04
            target: template_debug
            dev_build: yes
            platform: android
            arch: x86_64
          - identifier: android-x86_64-release
            name: 🤖 Android x86_64 Release
            runner: ubuntu-24.04
            target: template_release
            dev_build: no
            platform: android
            arch: x86_64
          - identifier: ios-arm64-all
            name: 🍏 iOS (arm64) All
            runner: macos-latest
            platform: ios
          - identifier: web-debug
            name: 🌐 Web Debug
            runner: ubuntu-24.04
            target: template_debug
            dev_build: yes
            platform: web
            arch: wasm32
          - identifier: web-release
            name: 🌐 Web Release
            runner: ubuntu-24.04
            target: template_release
            dev_build: no
            platform: web
            arch: wasm32
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up SCons
        shell: bash
        run: |
          python -c "import sys; print(sys.version)"
          python -m pip install scons
          scons --version

      - name: Checkout project
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout godot-cpp
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot-cpp
          path: godot-cpp
          submodules: recursive
          ref: "godot-4.5-stable"

      - name: (Web) Install Emscripten
        if: ${{ matrix.platform == 'web' }}
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: (Windows) Install mingw64
        if: ${{ matrix.platform == 'windows' }}
        uses: CodeNameTwister/setup-mingw@master

      - name: (Linux) Install dependencies
        if: ${{ matrix.platform == 'linux' }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qqq build-essential pkg-config

      - name: (Android) Install dependencies
        if: ${{ matrix.platform == 'android' }}
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28b
          link-to-sdk: true

      - name: Setup build cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.scons-cache/
          key: ${{ matrix.identifier }}
          restore-keys: |
            ${{ matrix.identifier }}
        continue-on-error: true

      - name: (WIN) Compile extension
        shell: sh
        if: ${{ matrix.platform == 'windows'}}
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache/
          SCONS_CACHE_LIMIT: 7168
        run: |
          scons target='${{ matrix.target }}' platform='${{ matrix.platform }}' arch='${{ matrix.arch }}' dev_build='${{ matrix.dev_build }}' use_mingw='yes' warn_as_error='no'

      - name: (Web) Compile extension
        shell: sh
        if: ${{ matrix.platform == 'web' }}
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache/
          SCONS_CACHE_LIMIT: 7168
        run: |
          scons target='${{ matrix.target }}' platform='${{ matrix.platform }}' arch='wasm32' dev_build='${{ matrix.dev_build }}'

      - name: (Android) Compile extension
        shell: sh
        if: ${{ matrix.platform == 'android' }}
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache/
          SCONS_CACHE_LIMIT: 7168
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          scons target='${{ matrix.target }}' platform='${{ matrix.platform }}' arch='${{ matrix.arch }}' dev_build='${{ matrix.dev_build }}'

      - name: (Linux/macOS) Compile extension
        shell: sh
        if: ${{ matrix.platform == 'linux' || matrix.platform == 'macos' }}
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache/
          SCONS_CACHE_LIMIT: 7168
        run: |
          scons target='${{ matrix.target }}' platform='${{ matrix.platform }}' arch='${{ matrix.arch }}' dev_build='${{ matrix.dev_build }}'

      - name: (iOS) Compile extension
        shell: sh
        if: ${{ matrix.platform == 'ios' }}
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache/
          SCONS_CACHE_LIMIT: 7168
        run: |
          chmod +x ./utils/build-ios.sh && ./utils/build-ios.sh

      - name: Copy extra files to target folder
        shell: sh
        run: |
          cp -n '${{ github.workspace }}/README.md' '${{ github.workspace }}/LICENSE.md' '${{ github.workspace }}/demo/bin/'

      - name: Create artifact folder
        shell: sh
        run: |
          mkdir -p '${{ github.workspace }}/artifact-${{ matrix.identifier }}/${{ github.event.repository.name }}/'

      - name: Copy target folder to artifact folder
        shell: sh
        run: |
          cp -n -r '${{ github.workspace }}/demo/bin' '${{ github.workspace }}/artifact-${{ matrix.identifier }}/${{ github.event.repository.name }}/'

      - name: (Windows) Delete compilation files
        if: ${{ matrix.platform == 'windows' }}
        run: |
          Remove-Item ${{ github.workspace }}/artifact-${{ matrix.identifier }}/${{ github.event.repository.name }}/bin/windows/* -Include *.exp,*.lib,*.ilk -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.identifier }}-${{ github.sha }}
          path: |
            ${{ github.workspace }}/artifact-${{ matrix.identifier }}/
          compression-level: 9
          retention-days: 14

  merge-platforms:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - identifier: linux-x86_64
            name: 🐧 Linux
            matchpattern: linux
          - identifier: macos-universal
            name: 🍎 macOS (universal)
            matchpattern: macos
          - identifier: windows
            name: 🏁 Windows
            matchpattern: windows
          - identifier: android
            name: 🤖 Android
            matchpattern: android
          - identifier: ios
            name: 🍏 iOS
            matchpattern: ios
          - identifier: web
            name: 🌐 Web
            matchpattern: web

    steps:
      - name: Merge artifacts for platform
        uses: actions/upload-artifact/merge@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.matchpattern }}-${{ github.sha }}
          pattern: ${{ github.event.repository.name }}-${{ matrix.matchpattern }}*
          compression-level: 9
          retention-days: 14

  merge-all:
    runs-on: ubuntu-latest
    needs: merge-platforms
    steps:
      - name: Merge artifacts into single
        uses: actions/upload-artifact/merge@v4
        with:
          name: ${{ github.event.repository.name }}-all-${{ github.sha }}
          pattern: ${{ github.event.repository.name }}-*
          compression-level: 9
          retention-days: 14

  upload-to-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: merge-all
    permissions:
      contents: write
    steps:
      - name: Download 'all' artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-all-${{ github.sha }}
          path: artifact-all
      - name: Download 'android' artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-android-${{ github.sha }}
          path: artifact-android
      - name: Download 'macos' artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-macos-${{ github.sha }}
          path: artifact-macos
      - name: Download 'linux' artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-linux-${{ github.sha }}
          path: artifact-linux
      - name: Download 'windows' artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-windows-${{ github.sha }}
          path: artifact-windows
      - name: Download 'ios' artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-ios-${{ github.sha }}
          path: artifact-ios
      - name: Download 'web' artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-web-${{ github.sha }}
          path: artifact-web

      - name: Zip 'all' artifact
        run: |
          cd artifact-all
          zip -9 -r ../${{ github.event.repository.name }}-all-${{ github.sha }}.zip .
          cd ..
      - name: Zip 'android' artifact
        run: |
          cd artifact-android
          zip -9 -r ../${{ github.event.repository.name }}-android-${{ github.sha }}.zip .
          cd ..
      - name: Zip 'macos' artifact
        run: |
          cd artifact-macos
          zip -9 -r ../${{ github.event.repository.name }}-macos-${{ github.sha }}.zip .
          cd ..
      - name: Zip 'linux' artifact
        run: |
          cd artifact-linux
          zip -9 -r ../${{ github.event.repository.name }}-linux-${{ github.sha }}.zip .
          cd ..
      - name: Zip 'windows' artifact
        run: |
          cd artifact-windows
          zip -9 -r ../${{ github.event.repository.name }}-windows-${{ github.sha }}.zip .
          cd ..
      - name: Zip 'ios' artifact
        run: |
          cd artifact-ios
          zip -9 -r ../${{ github.event.repository.name }}-ios-${{ github.sha }}.zip .
          cd ..
      - name: Zip 'web' artifact
        run: |
          cd artifact-web
          zip -9 -r ../${{ github.event.repository.name }}-web-${{ github.sha }}.zip .
          cd ..

      - name: Create draft release and upload assets
        uses: softprops/action-gh-release@v2.5.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            ${{github.event.repository.name}}-all-${{ github.sha }}.zip
            ${{github.event.repository.name}}-android-${{ github.sha }}.zip
            ${{github.event.repository.name}}-macos-${{ github.sha }}.zip
            ${{github.event.repository.name}}-linux-${{ github.sha }}.zip
            ${{github.event.repository.name}}-windows-${{ github.sha }}.zip
            ${{github.event.repository.name}}-ios-${{ github.sha }}.zip
            ${{github.event.repository.name}}-web-${{ github.sha }}.zip
